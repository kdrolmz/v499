<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CACHE SORUNUNU BİTİR -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Transfer Panel</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f5f5f5;
}
input, button {
  padding:10px;
  margin:5px;
}
.card {
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>Transfer Panel</h2>

<input id="date" placeholder="2026-04-11">
<input id="time" placeholder="10:00">
<input id="pickup" placeholder="Nereden">
<input id="dropoff" placeholder="Nereye">

<button onclick="add()">Ekle</button>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 SENİN CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyACS3feekO-KVvDQCxzOp1dchYkjjLAzDE",
  authDomain: "odeme-transfer.firebaseapp.com",
  projectId: "odeme-transfer",
  storageBucket: "odeme-transfer.firebasestorage.app",
  messagingSenderId: "49109592000",
  appId: "1:49109592000:web:6120cd1cbb33e43c220a25"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔴 BURAYA KENDİ HESABINI YAZ
const EMAIL = "kdrolmz39@gmail.com";
const PASS = "KadR1655.";

let transfers = [];

// 🔥 LOGIN
await signInWithEmailAndPassword(auth, EMAIL, PASS);

// 🔥 FIRESTORE REF
const ref = doc(db, "olmeztur", "main");

// 🔥 REALTIME SYNC (EN ÖNEMLİ)
onSnapshot(ref, (snap)=>{
  if(snap.exists()){
    const data = snap.data();
    transfers = data?.payload?.t || [];
    render();
  }
});

// 🔥 SAVE
async function save(){
  await setDoc(ref,{
    payload:{ t: transfers }
  }, { merge:true });
}

// 🔥 RENDER
function render(){
  const el = document.getElementById("list");
  el.innerHTML = "";

  transfers.forEach(t=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <b>${t.date} ${t.time}</b><br>
      ${t.pickup} → ${t.dropoff}
      <br>
      <button onclick="del('${t.id}')">Sil</button>
    `;
    el.appendChild(div);
  });
}

// 🔥 ADD
window.add = async function(){
  const item = {
    id: Date.now().toString(),
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    pickup: document.getElementById("pickup").value,
    dropoff: document.getElementById("dropoff").value,
    status: "bos"
  };

  transfers.push(item);

  await save();
}

// 🔥 DELETE
window.del = async function(id){
  transfers = transfers.filter(x=>x.id !== id);

  await save();
}

</script>

</body>
</html>
