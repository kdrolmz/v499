<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#F6F2EC;font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1D1C1A;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#root{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
input,select,textarea{font-size:16px!important;-webkit-appearance:none;font-family:inherit;outline:none}
button{-webkit-appearance:none;font-family:inherit;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
button:active{opacity:.88;transform:scale(.985)}
::-webkit-scrollbar{display:none}
@supports(padding-top:env(safe-area-inset-top)){.st{padding-top:env(safe-area-inset-top)}.sb{padding-bottom:calc(env(safe-area-inset-bottom)+4px)}}
.card{background:#FFFCF8;border-radius:16px;border:1px solid #E4DDD4;box-shadow:0 1px 3px rgba(60,52,38,.04),0 1px 2px rgba(60,52,38,.03);padding:16px}
.inp{background:#F6F2EC;border:1px solid #E4DDD4;border-radius:10px;padding:10px 12px;color:#1D1C1A;width:100%;display:block;transition:border-color .15s,box-shadow .15s,background .15s;font-weight:500}
.inp:focus{border-color:#686868;background:#FFFFFF;box-shadow:0 0 0 3px rgba(104,104,104,.12)}
.lbl{font-size:10px;font-weight:700;color:#8C857D;letter-spacing:.7px;text-transform:uppercase;display:block;margin-bottom:5px}
.mo{position:fixed;inset:0;background:rgba(29,28,26,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ms{width:100%;max-width:560px;background:#FFFFFF;border-radius:24px 24px 0 0;padding:22px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(29,28,26,.18)}
.toast{position:fixed;top:78px;left:50%;transform:translateX(-50%);background:#686868;color:#FFFFFF;padding:10px 22px;border-radius:40px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(29,28,26,.25);letter-spacing:.1px;border:1px solid rgba(255,255,255,.15)}
/* Desktop layout */
@media (min-width: 900px){
  html,body{background:#EDE8DE}
  main.main-cont{max-width:1200px!important;padding:18px 24px 140px!important}
  .desk-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px}
  .desk-wide{grid-column:1/-1}
  .card{padding:18px}
}
@media (min-width: 1200px){
  main.main-cont{max-width:1320px!important}
  .desk-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
}
.tr-row{transition:box-shadow .18s ease,border-color .18s ease,transform .1s ease}
.tr-row:hover{box-shadow:0 4px 18px rgba(60,52,38,.09)}
.amt-pos{color:#246B3D;font-variant-numeric:tabular-nums}
.amt-neg{color:#A33A3A;font-variant-numeric:tabular-nums}
/* Transfer type-based gradient accents — NUDE palette */
.tr-arrival{background:linear-gradient(135deg,#D6C5AE 0%,#E8DFCF 30%,#FFFCF8 65%) !important;border-left:3px solid #C0AB8D !important}
.tr-departure{background:linear-gradient(135deg,#C6C2BA 0%,#D9D6CF 30%,#FFFCF8 65%) !important;border-left:3px solid #A8A49A !important}
.tr-tour{background:linear-gradient(135deg,#B8C4C9 0%,#DBE3E5 30%,#FFFCF8 65%) !important;border-left:3px solid #8EA2A8 !important}
.tr-intercity{background:linear-gradient(135deg,#E4DDD4 0%,#F0EBE3 30%,#FFFCF8 65%) !important;border-left:3px solid #8C857D !important}
/* Date header — dark gray */
.date-hdr{background:#686868;border:1px solid #585858;border-radius:12px;padding:12px 18px;margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 18px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 0 rgba(0,0,0,.2);position:relative;overflow:hidden}
.date-hdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#A8A49A 0%,#8C857D 50%,#6D665E 100%);box-shadow:0 0 10px rgba(168,164,154,.3)}
.date-hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%)}
.date-hdr-txt{font-size:12.5px;font-weight:700;color:#FFFFFF;letter-spacing:1.2px;text-transform:uppercase;text-shadow:0 1px 2px rgba(0,0,0,.35);font-feature-settings:'ss01' on}
.date-hdr-meta{font-size:10px;color:rgba(255,255,255,.65);font-weight:600;letter-spacing:.4px;text-transform:uppercase}
/* Bugüne Dön butonu — inline, tarih bar altında */
.bugun-inline{display:inline-flex;align-items:center;gap:5px;background:#FFFCF8;color:#1D1C1A;border:1px solid #E4DDD4;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;letter-spacing:.3px;cursor:pointer;margin:0 0 10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bugun-inline:active{background:#F0EBE3}
</style>
