const { useState, useEffect, useRef } = React;
const FIREBASE_CONFIG = window.OLMEZTUR_FIREBASE_CONFIG || null;
const CLOUD_DOC_ID = window.OLMEZTUR_CLOUD_DOC_ID || 'main';
const STORAGE_KEY = 'tp10';
const OL = 'Ölmeztur', PLAKA = '16 LMZ 55';
const NAV = '#1A3E6E', NAV2 = '#0F2A50', GOLD = '#C8A962';
const G = '#1F7A54', R = '#A53939', BR = '#5F6670', O = '#9A7338', TX = '#2B2E33', SB = '#757A83', INP = '#F5F2EC', BOR = '#E8E4DC';

// ... (Diğer sabitler: TIPLER, VEHS, ROTALAR, PAYMS, GIDER_KAT, LOCS aynı kalıyor)

// index-29 mantığına göre bakiye ve kar hesaplama fonksiyonları
function olmezKar(t) {
    const c = parseFloat(t.customerTRY) || 0, d = parseFloat(t.driverPayment) || 0, alt = parseFloat(t.altAcentaUcreti) || 0;
    const yes = t.paymentCollect === 'yes';
    const alan = t.assignedTo === OL && t.givenBy && t.givenBy !== OL;
    const veren = t.givenBy === OL && t.assignedTo && t.assignedTo !== OL;
    if (alan) {
        if (t.altAcenta && alt > 0) return d - alt;
        return d;
    }
    if (veren) {
        if (!yes) return 0;
        if (t.altAcenta && alt > 0) return d - alt;
        return c - d;
    }
    if (!yes) return 0;
    return c - d;
}

function calcBal(t) {
    const c = parseFloat(t.customerTRY || t.paymentAmount) || 0;
    const d = parseFloat(t.driverPayment) || 0;
    const alt = parseFloat(t.altAcentaUcreti) || 0;
    const yes = t.paymentCollect === 'yes';
    const veren = t.givenBy === OL && t.assignedTo && t.assignedTo !== OL;
    const alan = t.assignedTo === OL && t.givenBy && t.givenBy !== OL;
    if (!veren && !alan) return null;
    const firm = veren ? t.assignedTo : t.givenBy;
    if (alan) {
        if (t.altAcenta && alt > 0 && yes) return { firm, netOl: -Math.max(0, c - d) };
        if (yes) { const v = Math.max(0, c - d); return { firm, netOl: -v }; }
        return { firm, netOl: d };
    }
    if (yes) return { firm, netOl: c - d };
    return { firm, netOl: -d };
}

function calcAltBal(t) {
    if (!t.altAcenta || !(parseFloat(t.altAcentaUcreti) > 0)) return null;
    const d = parseFloat(t.driverPayment) || 0;
    const alt = parseFloat(t.altAcentaUcreti) || 0;
    if (t.paymentCollect === 'yes') return { firm: t.altAcenta, netOl: d };
    return { firm: t.altAcenta, netOl: -alt };
}

// ... (Diğer yardımcı fonksiyonlar: transferNetAmount, mergeSnapshots vs.)

function HesapTab({ T, sT, agencies, tip }) {
    const [sel, setSel] = useState('');
    const [ay, setAy] = useState(new Date().toISOString().slice(0, 7));
    const [detayT, setDetayT] = useState(null);

    const togSettle = (id, firm) => sT(p => p.map(x => { 
        if (x.id !== id) return x; 
        const sf = { ...(x.settledFirms || {}) }; 
        sf[firm] = !sf[firm]; 
        return { ...x, settledFirms: sf }; 
    }));

    const isFirmSettled = (t, firm) => !!(t.settledFirms && t.settledFirms[firm]);

    const firmalar = [...new Set([...T.map(t => t.givenBy), ...T.map(t => t.assignedTo), ...T.filter(t => t.altAcenta).map(t => t.altAcenta), ...agencies])].filter(Boolean).filter(f => f !== OL).sort();

    const ozet = firm => {
        let al = 0, ver = 0;
        const detay = [];
        T.forEach(t => {
            const b = calcBal(t);
            if (b && b.firm === firm) {
                const km = isFirmSettled(t, firm);
                const e = { ...t, netOl: b.netOl, firmSettled: km, yon: t.givenBy === OL ? 'benVerdim' : 'oVerdi' };
                detay.push(e);
                if (!km) { if (b.netOl > 0) al += b.netOl; else ver += Math.abs(b.netOl); }
            }
            const ba = calcAltBal(t);
            if (ba && ba.firm === firm) {
                const km = isFirmSettled(t, firm + '_alt');
                const e = { ...t, netOl: ba.netOl, kaynak: 'alt', firmSettled: km, yon: 'alt' };
                detay.push(e);
                if (!km) { if (ba.netOl > 0) al += ba.netOl; else ver += Math.abs(ba.netOl); }
            }
        });
        return { ts: detay, al, ver, net: al - ver };
    };

    // ... (sirketMsg, excelExport, renderHesapDetayModal, renderHesapKart detayları index-29 ile aynı)

    const renderAgencyDetails = () => {
        if (!sel) return null;
        const { ts, al, ver, net } = ozet(sel);
        const mts = ts.filter(t => t.date && t.date.startsWith(ay));
        const mAl = Math.round(mts.filter(t => !isFirmSettled(t, sel) && (calcBal(t)?.netOl > 0 || calcAltBal(t)?.netOl > 0)).reduce((s, t) => s + (t.netOl || 0), 0));
        // ... (mts hesaplamaları devamı)

        return (
            <React.Fragment>
                <div className="card">
                    <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:12}}>
                        <div style={{width:44, height:44, borderRadius:13, background:'linear-gradient(135deg,'+NAV+','+NAV2+')', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20}}>🏢</div>
                        <div>
                            <div style={{fontWeight:800, fontSize:16, color:TX}}>{sel}</div>
                            <div style={{fontSize:11, color:SB}}>{ts.length} kayıt</div>
                        </div>
                    </div>
                    <div style={{background: net >= 0 ? '#E8F5ED' : '#F8EBEB', border: '1px solid ' + (net >= 0 ? '#A8D5B5' : '#D8A0A0'), borderRadius: 12, padding: 12, marginBottom: 10, textAlign: 'center'}}>
                        <div style={{fontSize:11, fontWeight:700, color: net >= 0 ? G : R, marginBottom:3}}>{net >= 0 ? 'ÖLMEZTUR ALACAKLI' : 'ÖLMEZTUR VERECEKLİ'}</div>
                        <div style={{fontSize:26, fontWeight:800, color: net >= 0 ? G : R}}>{fr(Math.abs(net))} ₺</div>
                    </div>
                    {/* ... (Alacak/Verecek gridi ve iş listesi) */}
                </div>
            </React.Fragment>
        );
    };

    return (
        <div style={{display:'flex', flexDirection:'column', gap:10}}>
            <div className="card">
                <div style={{fontWeight:800, fontSize:14, color:TX, marginBottom:10}}>🏢 Acenta Hesapları</div>
                <select value={sel} onChange={e => setSel(e.target.value)} className="inp" style={{fontSize:'14px', fontWeight:700}}>
                    <option value="">-- Acenta Seçin --</option>
                    {firmalar.map(f => <option key={f} value={f}>{f}</option>)}
                </select>
            </div>
            {renderAgencyDetails()}
            {renderHesapDetayModal()}
        </div>
    );
}
